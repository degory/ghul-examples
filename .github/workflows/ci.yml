name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v7

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Build
      run: dotnet build

    - name: Run Integration Tests
      run: dotnet ghul-test --use-dotnet-build integration-tests

  code_review:
    needs: [build]
    name: Claude code review

    timeout-minutes: 15

    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

    continue-on-error: true

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 1

    - name: Fetch GHUL.md from degory/ghul main
      run: curl -fsSL https://raw.githubusercontent.com/degory/ghul/main/GHUL.md -o GHUL.md

    - name: Fetch STYLE.md from degory/ghul-style main
      env:
        GH_TOKEN: ${{ secrets.GHUL_STYLE_TOKEN }}
      run: gh api repos/degory/ghul-style/contents/STYLE.md --jq '.content' | base64 -d > STYLE.md

    - uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        allowed_bots: "*"
        prompt: |
          Review pull request #${{ github.event.pull_request.number }} on ${{ github.repository }}.

          CI has already passed for this commit - build and integration tests are settled. Don't second-guess validity.

          Read these files first, in order:
          1. .github/claude-review.md - how to operate, severity bar, what to flag
          2. STYLE.md - authoritative terminology, prose, and code-comment rules (freshly fetched from degory/ghul-style main)
          3. GHUL.md - ghūl language reference (freshly fetched from degory/ghul main)

          The PR branch is already checked out. Useful commands:
          - `gh pr diff ${{ github.event.pull_request.number }}` - the diff
          - `gh pr view ${{ github.event.pull_request.number }} --json title,body` - PR title and description

          Post findings only to GitHub per the brief. Do not put review text in chat messages.
        claude_args: |
          --model claude-opus-4-8
          --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Read,Glob,Grep"
